<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Habits</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Inter, Arial, sans-serif;
    }

    body {
      background: #0f1115;
      color: #e5e7eb;
      min-height: 100vh;
      padding: 32px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    h1 {
      font-size: 32px;
      font-weight: 700;
    }

    .add-form {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .add-input {
      background: #171a21;
      color: #e5e7eb;
      border: 1px solid #262b36;
      border-radius: 12px;
      padding: 12px 14px;
      outline: none;
      min-width: 220px;
    }

    .add-button {
      background: #22c55e;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .add-button:hover {
      background: #16a34a;
    }

    .habit-list {
      display: grid;
      gap: 16px;
    }

    .habit-card {
      background: #171a21;
      border: 1px solid #262b36;
      border-radius: 16px;
      padding: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .habit-info {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .habit-name {
      font-size: 18px;
      font-weight: 700;
    }

    .streak {
      font-size: 14px;
      color: #9ca3af;
    }

    .open-button {
      display: inline-block;
      text-decoration: none;
      background: transparent;
      color: #e5e7eb;
      border: 1px solid #374151;
      padding: 10px 16px;
      border-radius: 10px;
    }

    .open-button:hover {
      background: #232834;
    }

    .delete-button {
      background: #dc2626;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
    }

    .delete-button:hover {
      background: #b91c1c;
    }

    @media (max-width: 600px) {
      .header,
      .habit-card {
        flex-direction: column;
        align-items: stretch;
      }

      .open-button,
      .add-button,
      .delete-button {
        width: 100%;
        text-align: center;
      }
    }
    @keyframes cardGlow{
      0% {box-shadow: 0 0 0 0 rgba(34,197,94,0);}
      50% {box-shadow: 0 0 0 4px rgba(34,197,94,0.4);}
      100% {box-shadow: 0 0 0 0 rgba(34,197,94,0);}
    }

    .habit-card{
      transition: transform 0.1s ease, box-shadow 0.2s;
    }

    .habit-card:hover{
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    .habit-streak{
      display: inline-flex;
      align-items: center;
      gap:6px;
      background: #1e1f25;
      padding: 4px 12px;
      border-radius: 30px;
      font-size: 13px;
    }

    .streak-fire{
      animation: flane ls infinite;
    }
    .mark-btn:active {
    transform: scale(0.96);
    }
  </style>  
</head> 
<body>
  <div class="container">
    <div class="header">
      <h1>{{ .Locale.app_title }}</h1>
      <form class="add-form" action="/habit/create" method="post">
        <input name="name" class="add-input" placeholder="{{ .Locale.new_habit_placeholder}}" required>
        <button class="add-button" type="submit">{{ .Locale.add_habit }}</button></form>
      <form action="/logout" method="post">
        <button type="submit" class="add-button" style="background:#6b7280;">{{ .Locale.logout }}</button>
      </form>
      <div style="display: inline-flex; gap: 8px; margin-left: auto;">
        <a href="?lang=en" style="color:white; text-decoration:none;">EN</a>
        <a href="?lang=ru" style="color:white; text-decoration:none;">RU</a>
      </div>  
    </div>

    <div class="habit-list"> 
      {{range .Habits}}
      <div class="habit-card">
        <div class="habit-info">
          <div class="habit-name">{{.Name}}</div>
          <div class="habit-streak">
          <span class="streak-fire">🔥</span>
          <span>{{ $.Locale.streak }}{{.Streak}} {{ $.Locale.days }}</span>
        </div>       
      </div>
        <div style="display: flex; gap: 8px;">
          <a class="open-button" href="/habit?id={{.ID}}">{{ $.Locale.open }}</a>
       <form action="/habit/delete?id={{.ID}}" method="post" onsubmit="return confirm('{{ $.Locale.confirm_delete }}');">    <button class="delete-button" type="submit">{{ $.Locale.delete }}</button>
          </form>
        </div>
      </div>
      {{end}}      
    </div>
  </div>  
</body>  
<script>      
  document.querySelectorAll('.habit-card').forEach(card => {
    const streakText = card.querySelector('.habit-streak');
    if (!streakText) return;
    const match = streakText.innerText.match(/\d+/);
    const streak = match ? parseInt(match[0]) : 0;
    const fireSpan = streakText.querySelector('.streak-fire');
    let flames = 1;
    if (streak >= 100) flames = 5;
    else if (streak >= 30) flames = 3;
    else if (streak >= 7) flames = 2;
    fireSpan.innerHTML = '🔥'.repeat(flames);
  });
</script>
</html>
