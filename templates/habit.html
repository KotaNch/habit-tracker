<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Habit</title>
  <style>

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Inter, Arial, sans-serif; }
    body { background: #0f1115; color: #e5e7eb; min-height: 100vh; padding: 32px; }
    .container { max-width: 1100px; margin: 0 auto; }
    .topbar { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
    .back-btn, .mark-btn, .delete-btn { border: 0; border-radius: 12px; padding: 12px 18px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .back-btn { background: #232834; color: #e5e7eb; text-decoration: none; display: inline-block; }
    .mark-btn { background: #22c55e; color: #fff; }
    .mark-btn:hover { background: #16a34a; }
    .delete-btn { background: #dc2626; color: white; }
    .delete-btn:hover { background: #b91c1c; }
    .habit-title { font-size: 34px; font-weight: 800; margin-bottom: 8px; }
    .streak { color: #9ca3af; font-size: 15px; }
    .panel { margin-top: 28px; background: #171a21; border: 1px solid #262b36; border-radius: 18px; padding: 20px; overflow-x: auto; }
    .heatmap { display: grid; grid-auto-flow: column; grid-template-rows: repeat(7, 14px); gap: 4px; width: max-content; }
    .cell { width: 14px; height: 14px; border-radius: 3px; background: #2a2f3a; cursor: pointer; transition: background 0.1s; }
    .cell.done { background: #22c55e; }
    .cell:hover { filter: brightness(1.2); }
    .legend { margin-top: 16px; color: #9ca3af; font-size: 13px; }
    @media (max-width: 600px) { body { padding: 16px; } .habit-title { font-size: 28px; } }
    @keyframes flame{                     
      0% {text-shadow: 0 0 2px #ff9900, 0 0 4px #ff5500; opacity:0.8;}
      50% {text-shadow: 0 0 8px #ff6600, 0 0 12px #ff3300; opacity:1;}
      100% {text-shadow: 0 0 2px #ff9900, 0 0 4px #ff5500; opacity:0.8;}
    }
    .streak{
      font-size: 18px;  
      font-weight: 600;
      display: inline-flex;     
      align-items: center;
      gap: 8px;
      background: #1e1f25;
      padding:6px 14px;
      border-radius: 40px;
      width: fit-content;
    }
    .streak-value{
      font-size: 24px;
      font-weight: 800;
      color: #f97316;
      transition: all 0.2s ease;
    }
    .streak-flame{
      font-size: 22px;
      animation: flame 1s infinite;
      display: inline-block;
    }

    @keyframes streakPop{
      0% {transform: scale(1);}
      50% { transform: scale(1.2); text-shadow: 0 0 8px #ff9900;}
      100% {transform: scale(1);}
    }
    .streak-pop{
      animation: streakPop 0.3s ease-out;
    }

    .cell-clicked{
      animation: cellFlash 0.2s ease-out;
    }

    @keyframes cellFlash{
      0% {transform: scale(1); background-color: #ffffff;}
      50% {transform: scale(1.3); background-color: #ffcc00;}
      100% {transform: scale(1); background-color: inherit;}
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <a class="back-btn" href="/">{{ .Locale.back }}</a>
      <div style="display: flex; gap: 12px;">
        <button class="mark-btn" id="mark-today-btn">{{ .Locale.mark_today }}</button>
        <form action="/habit/delete?id={{.Habit.ID}}" method="post" onsubmit="return confirm('Delete habit {{.Habit.Name}}? All progress will be lost.');">
          <button class="delete-btn" type="submit">{{ .Locale.delete_habit }}</button>
        </form>
      </div>
    </div>

    <h1 class="habit-title">{{.Habit.Name}}</h1>
    <div class="streak" id="streak-container">
  <span class="streak-flame" id="streak-flame">🔥</span>
  <span>{{ .Locale.streak_label }}</span>
  <span class="streak-value" id="streak-value">{{.Habit.Streak}}</span>
  <span>{{ .Locale.days }}</span>
</div>
    <div class="panel">
      <div class="heatmap" id="heatmap">
        {{range .Days}}
          <div class="cell {{if .Done}}done{{end}}" data-date="{{.Date}}" title="{{.Date}}"></div>
        {{end}}
      </div>
      <div class="legend">{{ .Locale.click_to_toggle }}</div>
    </div>
  </div>

<script>
    const habitId = {{.Habit.ID}};
   // const streakSpan = document.getElementById('streak-text');
    const cells = document.querySelectorAll('.cell');
    const streakValueSpan = document.getElementById('streak-value');
    const flameSpan = document.getElementById('streak-flame');

    function updateStreakUI(newStreak) {
        if (!streakValueSpan) return;
        streakValueSpan.classList.add('streak-pop');
        setTimeout(() => streakValueSpan.classList.remove('streak-pop'), 300);
        streakValueSpan.textContent = newStreak;
        let flameCount = 1;
        if (newStreak >= 100) flameCount = 5;
        else if (newStreak >= 30) flameCount = 3;
        else if (newStreak >= 7) flameCount = 2;
        flameSpan.innerHTML = '🔥'.repeat(flameCount);
        if (newStreak >= 100) {
            streakValueSpan.style.color = '#ff0000';
            flameSpan.style.animation = 'flame 0.6s infinite';
        } else if (newStreak >= 30) {
            streakValueSpan.style.color = '#ff5500';
            flameSpan.style.animation = 'flame 0.8s infinite';
        } else if (newStreak >= 7) {
            streakValueSpan.style.color = '#ff9900';
            flameSpan.style.animation = 'flame 1s infinite';
        } else {
            streakValueSpan.style.color = '#f97316';
            flameSpan.style.animation = 'flame 1.2s infinite';
        }
    }

    async function toggleDay(date, cellElement) {
        cellElement.classList.add('cell-clicked');
        setTimeout(() => cellElement.classList.remove('cell-clicked'), 200);
        try {
            const formData = new URLSearchParams();
            formData.append('date', date);
            const response = await fetch(`/habit/toggle?id=${habitId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData
            });
            if (!response.ok) throw new Error('Server error');
            const data = await response.json();
            if (data.success) {
                if (data.done) {
                    cellElement.classList.add('done');
                } else {
                    cellElement.classList.remove('done');
                }
                updateStreakUI(data.streak);
            } else {
                alert('Failed to update');
            }
        } catch (err) {
            console.error(err);
            alert('Error toggling habit');
        }
    }

    cells.forEach(cell => {
        cell.addEventListener('click', (e) => {
            const date = cell.getAttribute('data-date');
            toggleDay(date, cell);
        });
    });

    const todayBtn = document.getElementById('mark-today-btn');
    if (todayBtn) {
        todayBtn.addEventListener('click', () => {
            todayBtn.style.transform = 'scale(0.95)';
            setTimeout(() => todayBtn.style.transform = '', 150);
            const today = new Date().toISOString().slice(0,10);
            const todayCell = Array.from(cells).find(cell => cell.getAttribute('data-date') === today);
            if (todayCell) toggleDay(today, todayCell);
            else alert('Сегодняшний день не найден в тепловой карте');
        });
    }


    updateStreakUI({{.Habit.Streak}});
</script>
</body>
</html>
