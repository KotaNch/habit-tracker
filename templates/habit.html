<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Habit</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Inter, Arial, sans-serif;
    }

    body {
      background: #0f1115;
      color: #e5e7eb;
      min-height: 100vh;
      padding: 32px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .back-btn,
    .mark-btn {
      border: 0;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .back-btn {
      background: #232834;
      color: #e5e7eb;
      text-decoration: none;
      display: inline-block;
    }

    .mark-btn {
      background: #22c55e;
      color: #fff;
    }

    .mark-btn:hover {
      background: #16a34a;
    }

    .habit-title {
      font-size: 34px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .streak {
      color: #9ca3af;
      font-size: 15px;
    }

    .panel {
      margin-top: 28px;
      background: #171a21;
      border: 1px solid #262b36;
      border-radius: 18px;
      padding: 20px;
      overflow-x: auto;
    }

    .heatmap {
      display: grid;
      grid-auto-flow: column;
      grid-template-rows: repeat(7, 14px);
      grid-auto-columns: 14px;
      gap: 4px;
      width: max-content;
    }

    .cell {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      background: #2a2f3a;
    }

    .cell.done {
      background: #22c55e;
    }

    .legend {
      margin-top: 16px;
      color: #9ca3af;
      font-size: 13px;
    }

    @media (max-width: 600px) {
      body {
        padding: 16px;
      }

      .habit-title {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <a class="back-btn" href="/">Back</a>

      <form action="/habit/toggle?id={{.Habit.ID}}" method="post">
        <button class="mark-btn" type="submit">Mark today</button>
      </form>
    </div>

    <h1 class="habit-title">{{.Habit.Name}}</h1>
    <div class="streak">Current streak: {{.Habit.Streak}} days</div>

    <div class="panel">
      <div class="heatmap">
        {{range .Days}}
          <div class="cell {{if .Done}}done{{end}}" title="{{.Date}}"></div>
        {{end}}
      </div>

      <div class="legend">
        Green = done. Gray = not done. Сейчас меняется только сегодняшний день.
      </div>
    </div>
  </div>
</body>
</html>
